<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyFightPlus</title>
<style>
/* ========================
   GLOBAL STYLES
======================== */
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0f0f1f, #1b1b2e);
    color: white;
    overflow-x: hidden;
}

h1, h2 {
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-top: 20px;
    text-shadow: 0 0 20px cyan;
}

h2 {
    font-size: 24px;
    margin-bottom: 20px;
}

button, input[type=number], input[type=file] {
    border: none;
    border-radius: 8px;
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    transition: 0.3s;
    cursor: pointer;
}

button:hover {
    background: #00ffff;
    color: black;
    box-shadow: 0 0 15px cyan;
}

.container {
    width: 800px;
    max-width: 95%;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

/* ========================
   MAIN MENU STYLES
======================== */
#mainMenu {
    display: block;
}

.fileList {
    margin-top: 10px;
    margin-bottom: 20px;
}

.fileItem {
    background: rgba(0,255,255,0.1);
    padding: 8px;
    border-radius: 5px;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.fileItem button {
    margin: 0 0 0 10px;
    padding: 5px 8px;
}

/* ========================
   PLAYER STYLES
======================== */
#playerPage {
    display: none;
    text-align: center;
}

#videoContainer {
    margin: 20px auto;
    width: 720px;
    max-width: 95%;
    background: black;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px cyan;
}

#mediaPlayer {
    width: 100%;
    max-height: 480px;
}

#controls {
    margin-top: 15px;
}

#controls button, #controls input[type=range] {
    margin: 5px;
}

/* ========================
   OPTIONS PAGE STYLES
======================== */
#optionsPage {
    display: none;
    text-align: center;
}

label {
    display: block;
    margin-top: 10px;
}

/* ========================
   COUNTDOWN STYLE
======================== */
#adCountdown {
    font-size: 24px;
    margin-top: 15px;
    text-shadow: 0 0 15px cyan;
}
</style>
</head>
<body>

<h1>SkyFightPlus</h1>
<h2>Sponsored by SkyFightPlus</h2>

<!-- ========================
     MAIN MENU
======================== -->
<div id="mainMenu" class="container">
    <h2>Main Menu</h2>

    <button onclick="showPage('playerPage')">Go to Player</button>
    <button onclick="showPage('optionsPage')">Options</button>
    <br>

    <input type="file" id="songUpload" accept="audio/*,video/*">
    <button onclick="addSong()">Add Song/Video</button>
    <input type="file" id="adUpload" accept="audio/*,video/*">
    <button onclick="addAd()">Add Ad</button>
    <button onclick="clearAll()">Clear All</button>

    <h3>Songs:</h3>
    <div id="songList" class="fileList"></div>

    <h3>Ads:</h3>
    <div id="adList" class="fileList"></div>
</div>

<!-- ========================
     PLAYER PAGE
======================== -->
<div id="playerPage" class="container">
    <h2>Player</h2>

    <div id="videoContainer">
        <video id="mediaPlayer" controls></video>
    </div>

    <div id="nowPlaying">Now Playing: None</div>
    <div id="adCountdown">Sponsor in: 0s</div>

    <div id="controls">
        <button onclick="pauseResume()">Pause/Resume</button>
        <button onclick="nextSong()">Next Song</button>
        <button onclick="prevSong()">Previous Song</button>
        <button onclick="resetAdTimer()">Reset Sponsor Timer</button>
        <label>Volume:
            <input type="range" min="0" max="1" step="0.05" onchange="setVolume(this.value)" value="1">
        </label>
        <button onclick="showPage('mainMenu')">Back to Menu</button>
    </div>
</div>

<!-- ========================
     OPTIONS PAGE
======================== -->
<div id="optionsPage" class="container">
    <h2>Options</h2>
    <label>Ad Interval (seconds):</label>
    <input type="number" id="adIntervalInput" value="30" min="5">

    <label>
        <input type="checkbox" id="shuffleToggle" checked> Shuffle Songs
    </label>

    <label>
        <input type="checkbox" id="repeatToggle" checked> Repeat Playlist
    </label>

    <button onclick="applyOptions()">Apply Options</button>
    <button onclick="showPage('mainMenu')">Back to Menu</button>
</div>

<script>
// ========================
// GLOBAL VARIABLES
// ========================
let songs = [];
let ads = [];
let currentSongIndex = 0;
let currentAdIndex = 0;
let adInterval = 30; // seconds
let countdown = adInterval;
let countdownTimer;
let mediaPlayer = document.getElementById('mediaPlayer');
let isPaused = false;
let shuffleEnabled = true;
let repeatEnabled = true;

// ========================
// PAGE NAVIGATION
// ========================
function showPage(pageId) {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('playerPage').style.display = 'none';
    document.getElementById('optionsPage').style.display = 'none';
    document.getElementById(pageId).style.display = 'block';
}

// ========================
// ADD / DELETE FILES
// ========================
function addSong() {
    let fileInput = document.getElementById('songUpload');
    let file = fileInput.files[0];
    if (!file) { alert('No song/video selected!'); return; }

    songs.push({file: URL.createObjectURL(file), name: file.name});
    updateSongList();
    fileInput.value = '';
}

function addAd() {
    let fileInput = document.getElementById('adUpload');
    let file = fileInput.files[0];
    if (!file) { alert('No ad selected!'); return; }

    ads.push({file: URL.createObjectURL(file), name: file.name});
    updateAdList();
    fileInput.value = '';
}

function updateSongList() {
    let list = document.getElementById('songList');
    list.innerHTML = '';
    songs.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = 'fileItem';
        div.textContent = `Song ${i+1}: ${s.name}`;
        let delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => { songs.splice(i,1); updateSongList(); };
        div.appendChild(delBtn);
        list.appendChild(div);
    });
}

function updateAdList() {
    let list = document.getElementById('adList');
    list.innerHTML = '';
    ads.forEach((a, i) => {
        let div = document.createElement('div');
        div.className = 'fileItem';
        div.textContent = `Ad ${i+1}: ${a.name}`;
        let delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => { ads.splice(i,1); updateAdList(); };
        div.appendChild(delBtn);
        list.appendChild(div);
    });
}

function clearAll() {
    songs = [];
    ads = [];
    updateSongList();
    updateAdList();
}

// ========================
// PLAYER LOGIC
// ========================
function startPlayer() {
    if (songs.length === 0) { alert('No songs uploaded!'); return; }
    if (ads.length === 0) { alert('No ads uploaded!'); return; }
    currentSongIndex = 0;
    currentAdIndex = 0;
    countdown = adInterval;
    playSong(currentSongIndex);
    startCountdown();
}

function playSong(index) {
    if (songs.length === 0) return;
    let song = songs[index];
    mediaPlayer.src = song.file;
    mediaPlayer.play();
    document.getElementById('nowPlaying').textContent = `Now Playing: ${song.name}`;
    mediaPlayer.onended = () => {
        nextSong();
    };
}

function playAd(index) {
    if (ads.length === 0) return;
    let ad = ads[index];
    mediaPlayer.src = ad.file;
    mediaPlayer.play();
    document.getElementById('nowPlaying').textContent = `Sponsor: ${ad.name}`;
    mediaPlayer.onended = () => {
        playSong(currentSongIndex);
        countdown = adInterval;
    };
}

// ========================
// SONG NAVIGATION
// ========================
function nextSong() {
    if (shuffleEnabled && songs.length > 1) {
        let next = currentSongIndex;
        while(next === currentSongIndex) {
            next = Math.floor(Math.random() * songs.length);
        }
        currentSongIndex = next;
    } else {
        currentSongIndex++;
        if (currentSongIndex >= songs.length) {
            if (repeatEnabled) currentSongIndex = 0;
            else { mediaPlayer.pause(); return; }
        }
    }
    playSong(currentSongIndex);
}

function prevSong() {
    currentSongIndex--;
    if (currentSongIndex < 0) currentSongIndex = songs.length-1;
    playSong(currentSongIndex);
}

// ========================
// PAUSE / RESUME
// ========================
function pauseResume() {
    if (!mediaPlayer.src) return;
    if (isPaused) mediaPlayer.play();
    else mediaPlayer.pause();
    isPaused = !isPaused;
}

// ========================
// VOLUME
// ========================
function setVolume(val) {
    mediaPlayer.volume = val;
}

// ========================
// AD COUNTDOWN
// ========================
function startCountdown() {
    document.getElementById('adCountdown').textContent = `Sponsor in: ${countdown}s`;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
            clearInterval(countdownTimer);
            currentAdIndex = (currentAdIndex % ads.length);
            playAd(currentAdIndex);
        } else {
            document.getElementById('adCountdown').textContent = `Sponsor in: ${countdown}s`;
        }
    }, 1000);
}

function resetAdTimer() {
    countdown = adInterval;
    startCountdown();
}

// ========================
// OPTIONS
// ========================
function applyOptions() {
    adInterval = parseInt(document.getElementById('adIntervalInput').value) || 30;
    shuffleEnabled = document.getElementById('shuffleToggle').checked;
    repeatEnabled = document.getElementById('repeatToggle').checked;
    alert('Options applied!');
}

// ========================
// AUTO START
// ========================
document.getElementById('mainMenu').addEventListener('dblclick', startPlayer);
</script>
</body>
</html>
