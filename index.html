<!DOCTYPE html>
<html>
<head>
  <title>SkyFightPlus</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 50px;
    }
    .box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      margin: auto;
    }
    .playlist {
      text-align: left;
      margin-top: 20px;
    }
    .playlist-item {
      background: rgba(0, 255, 0, 0.1);
      padding: 5px 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 5px;
    }
    .playlist-item.selected {
      background: rgba(0, 255, 0, 0.5);
    }
    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: cyan;
      cursor: pointer;
    }
    input[type="number"] {
      width: 60px;
    }
  </style>
</head>
<body>

<h1>SkyFightPlus</h1>
<p>Sponsored by SkyFightPlus</p>

<div class="box">
  <h3>Upload Media</h3>
  <input type="file" id="addMedia" accept="audio/*,video/*"><br>
  <button onclick="addMedia()">Add to Playlist</button>
  
  <h3>Playlist</h3>
  <div class="playlist" id="playlist"></div>

  <h3>Ad Interval (seconds)</h3>
  <input type="number" id="interval" value="30">

  <button onclick="startPlayer()">Start</button>
</div>

<script>
let playlist = [];
let adInterval = 30000;
let currentIndex = 0;
let audio = new Audio();
let adTimer = null;
let selectedIndex = -1;

function addMedia() {
  const fileInput = document.getElementById('addMedia');
  const file = fileInput.files[0];
  if (!file) {
    alert("Please select a file!");
    return;
  }

  playlist.push({file: URL.createObjectURL(file), name: file.name, type: file.type});
  renderPlaylist();
}

function renderPlaylist() {
  const container = document.getElementById('playlist');
  container.innerHTML = '';
  playlist.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (index === selectedIndex ? ' selected' : '');
    div.textContent = `${index + 1}. ${item.name} (${item.type.includes('video') ? 'Video' : 'Audio'})`;
    div.onclick = () => {
      selectedIndex = index === selectedIndex ? -1 : index; // toggle select/unselect
      renderPlaylist();
    };
    container.appendChild(div);
  });
}

function startPlayer() {
  if (playlist.length === 0) {
    alert("Add at least one media file to start!");
    return;
  }

  adInterval = document.getElementById('interval').value * 1000;
  currentIndex = 0;
  playNextSong();
  startAdTimer();
}

function playNextSong() {
  if (playlist.length === 0) return;

  // find next audio/video
  let next = playlist[currentIndex];
  audio.src = next.file;
  audio.play();
  currentIndex = (currentIndex + 1) % playlist.length;

  audio.onended = () => {
    playNextSong();
  };
}

function startAdTimer() {
  if (adTimer) clearInterval(adTimer);

  adTimer = setInterval(() => {
    // pause current media
    audio.pause();
    const ad = playlist.find(item => item.name.toLowerCase().includes('ad'));
    if (ad) {
      audio.src = ad.file;
      audio.play();
      audio.onended = () => {
        playNextSong(); // resume normal playlist
      };
    }
  }, adInterval);
}
</script>

</body>
</html>
