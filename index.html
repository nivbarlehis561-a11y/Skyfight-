<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyFightPlus Player</title>
<style>
/* ===== Body & Layout ===== */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #0b0f1a;
  color: #fff;
}
header {
  background: linear-gradient(90deg,#0ff,#0aa);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: 2px;
}
nav button {
  background: #0ff;
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  margin-left: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
nav button:hover { background: #0aa; color: #fff; transform: scale(1.05); }

main {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  max-width: 1000px;
  width: 95%;
  box-shadow: 0 0 40px #0ff;
}

#playerBox {
  width: 100%;
  max-height: 500px;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

video, audio {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}

.file-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.file-section h3 {
  margin: 0;
  font-size: 18px;
}

input[type="file"], input[type="number"] {
  padding: 8px;
  border-radius: 8px;
  border: none;
  width: 95%;
}

button.start-btn {
  background: #0ff;
  font-size: 16px;
  padding: 12px 25px;
  width: 100%;
  cursor: pointer;
  font-weight: bold;
}
button.start-btn:hover { background: #0aa; color: #fff; }

/* Error & Status */
#errorMsg {
  color: #f44;
  font-weight: bold;
  margin-top: 10px;
}
#currentFile {
  margin-top: 5px;
  font-weight: bold;
  color: #0ff;
}
</style>
</head>
<body>

<header>
  <h1>SkyFightPlus Player</h1>
  <nav>
    <button onclick="showSection('upload')">Upload Files</button>
    <button onclick="showSection('player')">Player</button>
  </nav>
</header>

<main>
  <!-- ===== Upload Section ===== -->
  <div class="container" id="upload">
    <h2>Upload Songs & Ads</h2>
    <div class="file-section" id="songFiles">
      <h3>Songs (multiple allowed)</h3>
      <input type="file" id="songInput" accept="audio/*,video/*" multiple>
    </div>
    <div class="file-section" id="adFiles">
      <h3>Ads (multiple allowed)</h3>
      <input type="file" id="adInput" accept="audio/*,video/*" multiple>
    </div>
    <div class="file-section">
      <label>Ad Interval (seconds): </label>
      <input type="number" id="interval" value="30" min="5">
    </div>
    <button class="start-btn" onclick="initPlayer()">Start Player</button>
    <p id="errorMsg"></p>
  </div>

  <!-- ===== Player Section ===== -->
  <div class="container" id="player" style="display:none;">
    <h2>Player</h2>
    <div id="playerBox">
      <video id="videoPlayer" controls style="display:none;"></video>
      <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>
    <p id="currentFile">No file playing</p>
    <button class="start-btn" onclick="pausePlayer()">Pause</button>
    <button class="start-btn" onclick="resumePlayer()">Resume</button>
  </div>
</main>

<script>
/* ===== Sections ===== */
function showSection(id) {
  document.getElementById('upload').style.display = (id==='upload')?'block':'none';
  document.getElementById('player').style.display = (id==='player')?'block':'none';
}

/* ===== Media Player Logic ===== */
let songs = [];
let ads = [];
let currentSongIndex = 0;
let currentAdIndex = 0;
let adInterval = 30000;
let timer = null;
let isAdPlaying = false;
let mediaPlayer;

const videoPlayer = document.getElementById("videoPlayer");
const audioPlayer = document.getElementById("audioPlayer");
const currentFileText = document.getElementById("currentFile");
const errorMsg = document.getElementById("errorMsg");

function initPlayer() {
  errorMsg.textContent = "";
  songs = [];
  ads = [];
  currentSongIndex = 0;
  currentAdIndex = 0;
  isAdPlaying = false;

  const songFiles = document.getElementById("songInput").files;
  const adFiles = document.getElementById("adInput").files;
  const intervalInput = parseInt(document.getElementById("interval").value);

  if(songFiles.length===0) { errorMsg.textContent="❌ Upload at least 1 song"; return; }
  if(adFiles.length===0) { errorMsg.textContent="❌ Upload at least 1 ad"; return; }
  if(isNaN(intervalInput) || intervalInput<5) { errorMsg.textContent="❌ Interval must be >=5s"; return; }

  adInterval = intervalInput*1000;

  for(let f of songFiles) { songs.push({url:URL.createObjectURL(f), name:f.name}); }
  for(let f of adFiles) { ads.push({url:URL.createObjectURL(f), name:f.name}); }

  shuffleArray(songs);

  showSection('player');
  playSong();
  timer = setInterval(playAd, adInterval);
}

/* ===== Shuffle Utility ===== */
function shuffleArray(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

/* ===== Play Song ===== */
function playSong() {
  if(songs.length===0){ errorMsg.textContent="❌ No songs available"; return; }
  isAdPlaying=false;
  const song = songs[currentSongIndex];
  playMedia(song.url, song.name, false);
  currentSongIndex=(currentSongIndex+1)%songs.length;
}

/* ===== Play Ad ===== */
function playAd() {
  if(ads.length===0){ errorMsg.textContent="❌ No ads available"; return; }
  isAdPlaying=true;
  const ad = ads[currentAdIndex];
  playMedia(ad.url, "AD: "+ad.name, true);
  currentAdIndex=(currentAdIndex+1)%ads.length;
}

/* ===== Play Media Utility ===== */
function playMedia(url, displayName, isVideo) {
  currentFileText.textContent = "Playing: " + displayName;
  if(url.match(/\.(mp4|webm|ogg)$/i)) {
    audioPlayer.style.display="none";
    videoPlayer.style.display="block";
    mediaPlayer=videoPlayer;
  } else {
    videoPlayer.style.display="none";
    audioPlayer.style.display="block";
    mediaPlayer=audioPlayer;
  }
  mediaPlayer.src=url;
  mediaPlayer.play();
  if(!isVideo && isAdPlaying===false){
    mediaPlayer.onended=playSong;
  } else if(!isVideo && isAdPlaying===true){
    mediaPlayer.onended=playSong;
  } else {
    mediaPlayer.onended = ()=>{
      if(isAdPlaying) playSong();
    }
  }
}

/* ===== Pause/Resume ===== */
function pausePlayer() { if(mediaPlayer) mediaPlayer.pause(); }
function resumePlayer() { if(mediaPlayer) mediaPlayer.play(); }

</script>
</body>
</html>
