<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyFightPlus</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0f0a, #001100);
    color: #00ff66;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 60px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #00ff66;
  }

  .menu {
    background: rgba(0, 0, 0, 0.7);
    border-radius: 20px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 0 30px #00ff66;
  }

  button {
    margin: 5px;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #00ff66;
    color: black;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
  }

  button:hover:not(:disabled) {
    background: #00ff99;
  }

  button:disabled {
    background: #004400;
    cursor: not-allowed;
  }

  input[type="file"], input[type="number"] {
    margin: 5px;
  }

  .playlist {
    margin-top: 20px;
    text-align: left;
  }

  .playlist-item {
    margin: 5px 0;
    background: rgba(0,255,102,0.1);
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .playlist-item.selected {
    background: #00ff66;
    color: black;
    font-weight: bold;
  }

  .timer {
    font-size: 20px;
    margin-top: 10px;
  }

  video {
    width: 100%;
    max-width: 800px;
    margin-top: 20px;
    border-radius: 10px;
    background: black;
  }

  .interval-change {
    margin-top: 10px;
  }

  .ad-note {
    font-weight: bold;
    color: #00ff66;
    font-size: 18px;
    margin-bottom: 15px;
    text-shadow: 0 0 10px #00ff66;
  }
</style>
</head>
<body>

<h1>SkyFightPlus</h1>
<p>Sponsored by SkyFightPlus</p>

<div class="menu">
  <p class="ad-note">⚠️ Note: An ad might automatically play when you start/reload the player.</p>
  <button onclick="addSong()">Add Song</button>
  <button onclick="addAd()">Add Ad</button>
  <button id="deleteButton" onclick="deleteSelected()" disabled>Delete Selected</button>
  <button onclick="startPlayer()">Start/Reload Player</button>
  <button onclick="resetAdTimer()">Reset Ad Timer</button>

  <div class="interval-change">
    Change Ad Interval (seconds):
    <input type="number" id="intervalInput" value="30" min="1" onchange="changeInterval()">
  </div>

  <div class="timer" id="adTimerDisplay">Sponsor in: 0</div>

  <div class="playlist" id="playlist"></div>
</div>

<!-- SINGLE PERMANENT PLAYER -->
<video id="mainPlayer" controls></video>

<script>
let songs = [];
let ads = [];
let playlist = [];
let selectedIndex = null;
let currentSongIndex = 0;
let adInterval = 30;
let countdown = adInterval;
let adTimer;
let isPlayingAd = false;
let resumeTime = 0;
let currentSongFile = null;
let wasFullscreen = false;

const player = document.getElementById("mainPlayer");
const playlistDiv = document.getElementById("playlist");
const deleteButton = document.getElementById("deleteButton");
const intervalInput = document.getElementById("intervalInput");
const adTimerDisplay = document.getElementById("adTimerDisplay");

function addSong() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "audio/*,video/*";
  input.onchange = e => {
    if(e.target.files[0]) {
      songs.push(e.target.files[0]);
      updatePlaylist();
    }
  };
  input.click();
}

function addAd() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "audio/*,video/*";
  input.onchange = e => {
    if(e.target.files[0]) {
      ads.push(e.target.files[0]);
      updatePlaylist();
    }
  };
  input.click();
}

function deleteSelected() {
  if(selectedIndex === null) return;
  const item = playlist[selectedIndex];
  if(item.type === "song") songs.splice(item.originalIndex,1);
  else ads.splice(item.originalIndex,1);
  selectedIndex = null;
  updatePlaylist();
  deleteButton.disabled = true;
}

function updatePlaylist() {
  playlist = [];
  songs.forEach((s,i)=>playlist.push({type:"song",file:s,originalIndex:i}));
  ads.forEach((a,i)=>playlist.push({type:"ad",file:a,originalIndex:i}));
  renderPlaylist();
}

function renderPlaylist() {
  playlistDiv.innerHTML="";
  playlist.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="playlist-item";
    if(i===selectedIndex) div.classList.add("selected");
    div.textContent=`${i+1}. ${item.type.toUpperCase()} - ${item.file.name}`;
    div.onclick=()=>{
      selectedIndex = selectedIndex===i ? null : i;
      renderPlaylist();
      deleteButton.disabled = selectedIndex===null;
    };
    playlistDiv.appendChild(div);
  });
}

function startPlayer() {
  if(songs.length===0){ alert("No songs loaded"); return; }
  currentSongIndex = 0;
  countdown = adInterval;
  playSong();
  startAdCountdown();
}

function playSong() {
  if(currentSongIndex >= songs.length) currentSongIndex=0;
  currentSongFile = songs[currentSongIndex];
  resumeTime = 0;
  playFile(currentSongFile, false);
  currentSongIndex++;
}

function playFile(file, isAd=false) {
  wasFullscreen = !!document.fullscreenElement;
  if(!isAd) resumeTime = 0;

  player.src = URL.createObjectURL(file);
  player.currentTime = isAd ? 0 : resumeTime;
  player.play();

  if(wasFullscreen && player.requestFullscreen){
    player.requestFullscreen();
  }

  player.onended = function() {
    if(isPlayingAd) return;
    if(!isAd) playSong();
  };
}

function startAdCountdown() {
  clearInterval(adTimer);
  adTimer = setInterval(()=>{
    if(isPlayingAd) return;

    countdown--;
    adTimerDisplay.textContent = "Sponsor in: " + countdown;

    if(countdown <= 0 && ads.length>0) {
      isPlayingAd = true;
      resumeTime = player.currentTime;

      const adFile = ads[Math.floor(Math.random()*ads.length)];
      player.src = URL.createObjectURL(adFile);
      player.currentTime = 0;
      player.play();

      if(wasFullscreen && player.requestFullscreen){
        player.requestFullscreen();
      }

      player.onended = function() {
        isPlayingAd = false;
        player.src = URL.createObjectURL(currentSongFile);
        player.currentTime = resumeTime;
        player.play();
        countdown = adInterval;

        if(wasFullscreen && player.requestFullscreen){
          player.requestFullscreen();
        }

        player.onended = function(){
          if(!isPlayingAd) playSong();
        };
      };
    }
  },1000);
}

function resetAdTimer() {
  countdown = adInterval;
}

function changeInterval() {
  const val=parseInt(intervalInput.value);
  if(val && val>0){
    adInterval=val;
    countdown=adInterval;
  }
}
</script>

</body>
</html>
