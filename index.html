<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyFightPlus</title>
<style>
  /* ----- BODY & MAIN LAYOUT ----- */
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0f0f25, #1a1a40);
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    background: #01041f;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  header h1 {
    margin: 0;
    font-size: 32px;
    color: #00f0ff;
    letter-spacing: 2px;
  }

  nav button {
    margin-left: 10px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #00f0ff;
    color: #01041f;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  nav button:hover {
    background: #00e1ff;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .page {
    display: none;
    width: 800px;
  }

  .active {
    display: block;
  }

  .box {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }

  h2 {
    text-align: center;
    color: #00f0ff;
  }

  input[type="file"], input[type="number"] {
    margin: 10px 0;
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 100%;
  }

  button.action {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    background: #00f0ff;
    color: #01041f;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
  }

  button.action:hover {
    background: #00e1ff;
  }

  .file-list {
    margin: 10px 0;
  }

  .file-item {
    background: rgba(0,255,255,0.1);
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 5px;
  }

  .error {
    color: #ff4d4d;
    margin: 10px 0;
    font-weight: bold;
  }

  .player-container {
    margin-top: 20px;
    text-align: center;
  }

  video, audio {
    width: 100%;
    max-height: 400px;
    border-radius: 10px;
    margin-top: 10px;
    background: black;
  }

  .countdown {
    margin-top: 10px;
    font-size: 18px;
    color: #00f0ff;
    font-weight: bold;
  }

</style>
</head>
<body>

<header>
  <h1>SkyFightPlus</h1>
  <nav>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('player')">Player</button>
    <button onclick="showPage('settings')">Settings</button>
  </nav>
</header>

<main>
  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <div class="box">
      <h2>Upload Media</h2>
      <div class="file-list" id="songs-list"></div>
      <button class="action" onclick="addSong()">Add Song/Video</button>

      <div class="file-list" id="ads-list"></div>
      <button class="action" onclick="addAd()">Add Ad</button>

      <div class="error" id="home-error"></div>
    </div>
  </div>

  <!-- PLAYER PAGE -->
  <div id="player" class="page">
    <div class="box player-container">
      <h2>Now Playing</h2>
      <div id="now-playing-label">Nothing yet</div>
      <div id="player-area"></div>
      <div class="countdown" id="countdown-label">Sponsor in: --s</div>

      <button class="action" onclick="startPlayer()">Start Player</button>
      <button class="action" onclick="skipSong()">Skip Song</button>
      <button class="action" onclick="pauseResume()">Pause/Resume</button>
      <button class="action" onclick="resetTimer()">Reset Timer</button>

      <div class="error" id="player-error"></div>
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div id="settings" class="page">
    <div class="box">
      <h2>Settings</h2>
      <label>Ad Interval (seconds):</label>
      <input type="number" id="interval" value="30" min="5">
      <div class="error" id="settings-error"></div>
    </div>
  </div>
</main>

<script>
/* ======= PAGE NAVIGATION ======= */
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

/* ======= GLOBAL VARIABLES ======= */
let songs = [];
let ads = [];
let currentSongIndex = 0;
let currentAdIndex = 0;
let isPlaying = false;
let isPaused = false;
let adInterval = 30;
let adTimer;
let playerElement; 
let nowPlayingLabel = document.getElementById('now-playing-label');
let countdownLabel = document.getElementById('countdown-label');
let songPausedTime = 0;

/* ======= ADD SONG/VIDEO ======= */
function addSong(){
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'audio/*,video/*';
  fileInput.onchange = e => {
    const file = e.target.files[0];
    if(!file){return;}
    songs.push(file);
    updateSongList();
  };
  fileInput.click();
}

function addAd(){
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'audio/*,video/*';
  fileInput.onchange = e => {
    const file = e.target.files[0];
    if(!file){return;}
    ads.push(file);
    updateAdList();
  };
  fileInput.click();
}

function updateSongList(){
  const list = document.getElementById('songs-list');
  list.innerHTML = '';
  songs.forEach((f,i)=>{
    const div = document.createElement('div');
    div.className = 'file-item';
    div.textContent = `Song ${i+1}: ${f.name}`;
    list.appendChild(div);
  });
}

function updateAdList(){
  const list = document.getElementById('ads-list');
  list.innerHTML = '';
  ads.forEach((f,i)=>{
    const div = document.createElement('div');
    div.className = 'file-item';
    div.textContent = `AD ${i+1}: ${f.name}`;
    list.appendChild(div);
  });
}

/* ======= PLAYER LOGIC ======= */
function startPlayer(){
  if(songs.length===0){document.getElementById('player-error').textContent="Upload at least 1 song!"; return;}
  if(ads.length===0){document.getElementById('player-error').textContent="Upload at least 1 ad!"; return;}
  document.getElementById('player-error').textContent='';
  playerElement = document.getElementById('player-area');
  adInterval = parseInt(document.getElementById('interval').value);
  if(isNaN(adInterval)||adInterval<5){
    document.getElementById('settings-error').textContent="Interval must be a number >=5"; return;
  }
  document.getElementById('settings-error').textContent='';
  isPlaying = true;
  playSong();
  startAdCountdown();
}

function playSong(){
  if(!isPlaying) return;
  playerElement.innerHTML = '';
  const file = songs[currentSongIndex];
  nowPlayingLabel.textContent = `Song ${currentSongIndex+1}: ${file.name}`;
  let media;
  if(file.type.startsWith('video')){
    media = document.createElement('video');
    media.src = URL.createObjectURL(file);
    media.controls = true;
    media.autoplay = true;
  } else {
    media = document.createElement('audio');
    media.src = URL.createObjectURL(file);
    media.controls = true;
    media.autoplay = true;
  }
  playerElement.appendChild(media);
  media.onended = ()=>{
    if(songs.length===1){playSong();} 
    else {currentSongIndex = (currentSongIndex+1)%songs.length; playSong();}
  };
  if(isPaused){media.pause();}
  media.currentTime = songPausedTime;
  window.currentMedia = media; // track current media globally
}

function startAdCountdown(){
  let timeLeft = adInterval;
  countdownLabel.textContent = `Sponsor in: ${timeLeft}s`;
  clearInterval(adTimer);
  adTimer = setInterval(()=>{
    if(!isPlaying || isPaused) return;
    timeLeft--;
    countdownLabel.textContent = `Sponsor in: ${timeLeft}s`;
    if(timeLeft<=0){
      playAd();
      timeLeft = adInterval; // reset after ad finishes
    }
  },1000);
}

function playAd(){
  if(!isPlaying) return;
  if(!window.currentMedia) return;
  let pausedMedia = window.currentMedia;
  songPausedTime = pausedMedia.currentTime;
  pausedMedia.pause();
  playerElement.innerHTML = '';
  const adFile = ads[currentAdIndex];
  nowPlayingLabel.textContent = `AD ${currentAdIndex+1}: ${adFile.name}`;
  let adMedia;
  if(adFile.type.startsWith('video')){
    adMedia = document.createElement('video');
    adMedia.src = URL.createObjectURL(adFile);
    adMedia.controls = true;
    adMedia.autoplay = true;
  } else {
    adMedia = document.createElement('audio');
    adMedia.src = URL.createObjectURL(adFile);
    adMedia.controls = true;
    adMedia.autoplay = true;
  }
  playerElement.appendChild(adMedia);
  adMedia.onended = ()=>{
    currentAdIndex = (currentAdIndex+1)%ads.length;
    pausedMedia.currentTime = songPausedTime;
    pausedMedia.play();
  };
  window.currentMedia = pausedMedia;
}

/* ======= CONTROL BUTTONS ======= */
function skipSong(){
  if(!isPlaying) return;
  songPausedTime = 0;
  currentSongIndex = (currentSongIndex+1)%songs.length;
  playSong();
}

function pauseResume(){
  if(!isPlaying) return;
  if(!window.currentMedia) return;
  if(isPaused){
    window.currentMedia.play();
    isPaused = false;
  } else {
    window.currentMedia.pause();
    isPaused = true;
  }
}

function resetTimer(){
  startAdCountdown();
}

/* ======= INITIALIZE EMPTY LISTS ======= */
updateSongList();
updateAdList();

</script>
</body>
</html>
