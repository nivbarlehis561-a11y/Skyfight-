<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyFightPlus Player</title>
<style>
body {
  margin:0; font-family: Arial; background: black; color:#00ff00; text-align:center;
}
h1{font-size:48px;text-shadow:0 0 10px #00ff00;margin-bottom:10px;}
.menu-box{width:600px;margin:20px auto;padding:30px;border:2px solid #00ff00;border-radius:15px;box-shadow:0 0 20px #00ff00;background: rgba(0,255,0,0.05);}
.section{margin-bottom:20px;padding:15px;border:1px solid #00ff00;border-radius:10px;background:rgba(0,255,0,0.03);}
.section h2{margin-top:0;text-shadow:0 0 5px #00ff00;}
button{margin:5px;padding:10px 20px;font-size:16px;border-radius:10px;border:none;cursor:pointer;background-color:#00ff00;color:#000;font-weight:bold;text-shadow:0 0 5px #000;transition:0.3s;}
button:hover{background-color:#00cc00;}
ul{list-style:none;padding:0;}
li{margin:5px 0;padding:5px;border:1px solid #00ff00;border-radius:8px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,255,0,0.05);}
li span{flex-grow:1;text-align:left;padding-left:10px;}
#player-container{width:80%;max-width:800px;height:450px;margin:20px auto;background:black;border:2px solid #00ff00;border-radius:10px;box-shadow:0 0 20px #00ff00;position:relative;}
video, audio{width:100%;height:100%;border-radius:10px;background:black;}
#ad-timer{margin-top:10px;font-size:20px;text-shadow:0 0 5px #00ff00;}
.options input[type=number]{width:60px;text-align:center;margin-left:5px;}
</style>
</head>
<body>

<h1>SkyFightPlus</h1>
<div class="menu-box">
  <div class="section" id="songs-section">
    <h2>Songs / Videos</h2>
    <button onclick="addSong()">Add Song / Video</button>
    <button onclick="clearSongs()">Clear All</button>
    <ul id="songs-list"></ul>
  </div>

  <div class="section" id="ads-section">
    <h2>Ads</h2>
    <button onclick="addAd()">Add Ad</button>
    <button onclick="clearAds()">Clear All</button>
    <ul id="ads-list"></ul>
  </div>

  <div class="section" id="controls-section">
    <h2>Controls</h2>
    <button onclick="startPlayer()">Start</button>
    <button onclick="pausePlayer()">Pause</button>
    <button onclick="resumePlayer()">Resume</button>
    <button onclick="nextSong()">Next</button>
    <button onclick="previousSong()">Previous</button>
    <button onclick="resetAdTimer()">Reset Ad Timer</button>
    <br>
    <label>Ad Interval (seconds): <input type="number" id="ad-interval" value="30"></label>
    <br>
    <label>Shuffle Songs: <input type="checkbox" id="shuffle-songs" checked></label>
    <br>
    <div id="ad-timer">Sponsor in: --s</div>
  </div>
</div>

<div id="player-container">
  <video id="player" controls></video>
</div>

<script>
let songs = [];
let ads = [];
let currentSongIndex = 0;
let adIntervalTime = 30000;
let adTimer = null;
let countdownTimer = null;
let remainingTime = 0;
let isPlayingAd = false;
let player = document.getElementById('player');
let shuffle = true;

function addSong() {
  let input = document.createElement('input');
  input.type = 'file';
  input.accept = 'audio/*,video/*';
  input.onchange = () => {
    let file = input.files[0];
    if(file) {
      songs.push(URL.createObjectURL(file));
      updateSongList();
    }
  }
  input.click();
}

function addAd() {
  let input = document.createElement('input');
  input.type = 'file';
  input.accept = 'audio/*,video/*';
  input.onchange = () => {
    let file = input.files[0];
    if(file) {
      ads.push(URL.createObjectURL(file));
      updateAdList();
    }
  }
  input.click();
}

function updateSongList() {
  let list = document.getElementById('songs-list');
  list.innerHTML = '';
  songs.forEach((s,i)=>{
    let li = document.createElement('li');
    li.innerHTML = `<span>Song ${i+1}</span> <button onclick="deleteSong(${i})">Delete</button>`;
    list.appendChild(li);
  });
}

function updateAdList() {
  let list = document.getElementById('ads-list');
  list.innerHTML = '';
  ads.forEach((a,i)=>{
    let li = document.createElement('li');
    li.innerHTML = `<span>Ad ${i+1}</span> <button onclick="deleteAd(${i})">Delete</button>`;
    list.appendChild(li);
  });
}

function deleteSong(i) {
  songs.splice(i,1);
  if(currentSongIndex >= songs.length) currentSongIndex = 0;
  updateSongList();
}

function deleteAd(i) {
  ads.splice(i,1);
  updateAdList();
}

function clearSongs() {
  songs = [];
  currentSongIndex = 0;
  updateSongList();
}

function clearAds() {
  ads = [];
  updateAdList();
}

function startPlayer() {
  if(songs.length===0) { alert('Upload at least one song/video!'); return;}
  if(ads.length===0) { alert('Upload at least one ad!'); return;}
  shuffle = document.getElementById('shuffle-songs').checked;
  adIntervalTime = document.getElementById('ad-interval').value * 1000;
  currentSongIndex = 0;
  playSong();
  startAdTimer();
}

function playSong() {
  if(songs.length===0) return;
  isPlayingAd = false;
  player.src = songs[currentSongIndex];
  player.play().catch(e=>alert('Error playing song/video!'));
  player.onended = () => {
    if(shuffle) {
      currentSongIndex = Math.floor(Math.random()*songs.length);
    } else {
      currentSongIndex = (currentSongIndex+1)%songs.length;
    }
    playSong();
  };
}

function startAdTimer() {
  clearInterval(adTimer);
  clearInterval(countdownTimer);
  remainingTime = adIntervalTime/1000;
  document.getElementById('ad-timer').innerText = `Sponsor in: ${remainingTime}s`;
  countdownTimer = setInterval(() => {
    remainingTime--;
    if(remainingTime<0) remainingTime=0;
    document.getElementById('ad-timer').innerText = `Sponsor in: ${remainingTime}s`;
  },1000);
  adTimer = setTimeout(playAd, adIntervalTime);
}

function playAd() {
  if(ads.length===0) return;
  isPlayingAd = true;
  clearInterval(countdownTimer);
  let previousTime = player.currentTime;
  let previousSrc = player.src;
  let adIndex = Math.floor(Math.random()*ads.length);
  player.src = ads[adIndex];
  player.play().catch(e=>alert('Error playing ad!'));
  player.onended = () => {
    player.src = previousSrc;
    player.currentTime = previousTime;
    player.play().catch(e=>alert('Error resuming song/video!'));
    isPlayingAd = false;
    startAdTimer();
  };
}

function pausePlayer() {
  player.pause();
  clearTimeout(adTimer);
  clearInterval(countdownTimer);
}

function resumePlayer() {
  player.play();
  if(!isPlayingAd) startAdTimer();
}

function nextSong() {
  if(songs.length===0) return;
  currentSongIndex = (currentSongIndex+1)%songs.length;
  playSong();
}

function previousSong() {
  if(songs.length===0) return;
  currentSongIndex = (currentSongIndex-1+songs.length)%songs.length;
  playSong();
}

function resetAdTimer() {
  if(isPlayingAd) return;
  startAdTimer();
}
</script>
</body>
</html>
